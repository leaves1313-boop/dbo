<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분기별 예산집행 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', 'Noto Sans KR', Arial, sans-serif;
    background: linear-gradient(135deg, #eef4ff 0%, #f7fafc 45%, #fff7ed 100%);
    color: #1f2937;
  }
  .wrap {
    width: min(1080px, calc(100% - 32px));
    margin: 36px auto;
  }
  header {
    margin-bottom: 22px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 32px;
    letter-spacing: -0.04em;
  }
  .desc {
    margin: 0;
    color: #64748b;
    font-size: 15px;
  }
  .dashboard {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
    align-items: start;
  }
  .card {
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(148,163,184,0.28);
    border-radius: 22px;
    box-shadow: 0 18px 45px rgba(15,23,42,0.08);
    padding: 22px;
  }
  .form-card h2, .chart-card h2 {
    margin: 0 0 16px;
    font-size: 18px;
  }
  label {
    display: block;
    margin: 13px 0 7px;
    font-size: 14px;
    font-weight: 700;
    color: #334155;
  }
  input {
    width: 100%;
    height: 42px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    padding: 0 12px;
    font-size: 15px;
    outline: none;
    background: #fff;
  }
  input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
  }
  .quarter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
  }
  button {
    width: 100%;
    margin-top: 18px;
    height: 46px;
    border: 0;
    border-radius: 14px;
    background: #2563eb;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 12px 22px rgba(37,99,235,0.24);
  }
  button:hover { background: #1d4ed8; }
  #summary {
    margin-top: 16px;
    padding: 16px;
    border-radius: 16px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    font-size: 20px;
    font-weight: 900;
    color: #1e3a8a;
    min-height: 58px;
    display: flex;
    align-items: center;
  }
  .chart-box {
    position: relative;
    min-height: 390px;
  }
  canvas {
    width: 100% !important;
    height: 390px !important;
  }
  .notice {
    margin-top: 12px;
    font-size: 13px;
    color: #64748b;
  }
  @media (max-width: 820px) {
    .dashboard { grid-template-columns: 1fr; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>분기별 예산집행 대시보드</h1>
      <p class="desc">부서별 Q1~Q4 예산집행액을 입력하면 막대그래프와 핵심 요약 통계를 표시합니다.</p>
    </header>

    <section class="dashboard">
      <div class="card form-card">
        <h2>입력</h2>
        <label for="dept">부서</label>
        <input id="dept" type="text" placeholder="예: 기획">

        <div class="quarter-grid">
          <div>
            <label for="q1">Q1</label>
            <input id="q1" type="number" min="0" step="1" placeholder="백만원">
          </div>
          <div>
            <label for="q2">Q2</label>
            <input id="q2" type="number" min="0" step="1" placeholder="백만원">
          </div>
          <div>
            <label for="q3">Q3</label>
            <input id="q3" type="number" min="0" step="1" placeholder="백만원">
          </div>
          <div>
            <label for="q4">Q4</label>
            <input id="q4" type="number" min="0" step="1" placeholder="백만원">
          </div>
        </div>
        <button type="button" onclick="show()">표시</button>
        <div class="notice">요약 형식: 총합:NNN / 최대:Q? / 평균:N.N</div>
      </div>

      <div class="card chart-card">
        <h2 id="chartTitle">분기별 집행액</h2>
        <div class="chart-box">
          <canvas id="chart" width="600" height="300"></canvas>
        </div>
        <div id="summary"></div>
      </div>
    </section>
  </main>

<script>
let budgetChart = null;

function getNumber(id) {
  const value = document.getElementById(id).value;
  const number = Number(value);
  return Number.isFinite(number) ? number : 0;
}

function show() {
  const dept = document.getElementById('dept').value.trim();
  const labels = ['Q1', 'Q2', 'Q3', 'Q4'];
  const values = [getNumber('q1'), getNumber('q2'), getNumber('q3'), getNumber('q4')];

  const total = values.reduce((sum, value) => sum + value, 0);
  const maxValue = Math.max(...values);
  const maxQuarter = labels[values.findIndex(value => value === maxValue)];
  const average = (total / 4).toFixed(1);

  document.getElementById('summary').textContent = `총합:${total} / 최대:${maxQuarter} / 평균:${average}`;
  document.getElementById('chartTitle').textContent = dept ? `${dept} 부서 분기별 집행액` : '분기별 집행액';

  const ctx = document.getElementById('chart').getContext('2d');
  if (budgetChart) {
    budgetChart.destroy();
  }

  budgetChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: dept ? `${dept} 집행액` : '집행액',
        data: values,
        backgroundColor: 'rgba(37, 99, 235, 0.72)',
        borderColor: 'rgba(37, 99, 235, 1)',
        borderWidth: 1,
        borderRadius: 10
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true },
        tooltip: {
          callbacks: {
            label: context => `집행액: ${context.parsed.y}`
          }
        }
      },
      scales: {
        x: { title: { display: true, text: '분기' } },
        y: {
          beginAtZero: true,
          title: { display: true, text: '집행액' },
          ticks: { precision: 0 }
        }
      }
    }
  });
}
</script>
</body>
</html>
